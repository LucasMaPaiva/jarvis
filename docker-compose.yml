services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "4000:5678"
    networks:
      - default
      - proxy_network
    environment:
      - N8N_HOST=${DOMAIN_NAME}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_COMMUNITY_PACKAGES_ENABLED=${N8N_COMMUNITY_PACKAGES_ENABLED}
    volumes:
      - n8n_data:/home/node/.n8n

networks:
  proxy_network:
    external: true

volumes:
  n8n_data:
